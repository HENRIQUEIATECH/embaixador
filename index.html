<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IArtium - Amostra Técnica</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            font-family: sans-serif;
        }

        .container {
            text-align: center;
            padding: 40px;
            border: 1px solid rgba(191, 163, 106, 0.3); /* Borda sutil em dourado */
            border-radius: 15px;
            max-width: 500px;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffffff;
        }

        p.conceito {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .brand {
            font-size: 14px;
            color: #bfa36a;
            margin-top: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .contato {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Amostra Técnica Exclusiva</h2>
        
        <p class="conceito">
            Este é um protótipo conceitual privado.<br>
            O acesso foi encerrado conforme o protocolo de segurança.
        </p>

        <p class="brand">
            Desenvolvido por IArtium Tecnologia Nativa
        </p>

        <div class="contato">
            Para mais informações: iartium.com
        </div>
    </div>

</body>
</html>
